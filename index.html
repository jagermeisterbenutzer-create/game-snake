<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #game-container {
      position: relative;
      width: 100vw;
      max-width: 100vmin;
      aspect-ratio: 1/1;
      box-shadow: 0 0 32px #000a;
      background: #222;
      border-radius: 1vw;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      background: #222;
      display: block;
    }
    #score {
      font-size: 2rem;
      margin: 1rem 0 0.5rem 0;
      text-align: center;
    }
    #restart-btn {
      margin-top: 0.5rem;
      font-size: 1.2rem;
      padding: 0.5rem 1.5rem;
      background: #2ed573;
      color: #222;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      display: none;
    }
    /* On small screens, ensure everything fits nicely */
    @media (max-width: 600px) {
      #game-container {
        max-width: 98vw;
        border-radius: 2vw;
      }
      #score { font-size: 1.3rem; }
      #restart-btn { font-size: 1rem; }
    }
    /* Visual touch direction arrows for mobile */
    .mobile-arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 1.5rem;
      user-select: none;
    }
    .directions {
      display: flex;
      align-items: center;
    }
    .arrow-btn {
      background: #333;
      color: #2ed573;
      border: none;
      margin: 0.25em;
      border-radius: 50%;
      width: 3em;
      height: 3em;
      font-size: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px #0006;
      cursor: pointer;
      outline: none;
      touch-action: manipulation;
      transition: background 0.15s;
    }
    .arrow-btn:active {
      background: #2ed573;
      color: #222;
    }
    @media (min-width: 600px) {
      .mobile-arrows { display: none; }
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
  </div>
  <button id="restart-btn">Restart</button>
  <div class="mobile-arrows">
    <button class="arrow-btn" id="up">↑</button>
    <div class="directions">
      <button class="arrow-btn" id="left">←</button>
      <button class="arrow-btn" id="down">↓</button>
      <button class="arrow-btn" id="right">→</button>
    </div>
  </div>
  <script>
    // --- Snake Game Logic ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 20; // 20x20 grid
    const CELL_SIZE = canvas.width / GRID_SIZE;
    
    let snake, direction, apple, score, running, nextDirection, moveTimeoutId;
    
    function startGame() {
      snake = [{x: 10, y: 10}];
      direction = {x: 0, y: -1}; // moving up
      nextDirection = direction;
      apple = randomApple();
      score = 0;
      running = true;
      document.getElementById('score').textContent = 'Score: ' + score;
      document.getElementById('restart-btn').style.display = 'none';
      loop();
    }

    function loop() {
      if (!running) return;
      move();
      draw();
      moveTimeoutId = setTimeout(loop, 120);
    }

    function move() {
      direction = nextDirection;
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
      
      // Check wall collision
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE)
        return gameOver();
      // Check self-collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y))
        return gameOver();
      
      snake.unshift(head);
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        document.getElementById('score').textContent = 'Score: ' + score;
        apple = randomApple();
      } else {
        snake.pop();
      }
    }
    
    function gameOver() {
      running = false;
      document.getElementById('restart-btn').style.display = 'block';
      ctx.fillStyle = '#fa5252';
      ctx.font = 'bold 2.2rem sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width/2, canvas.height/2+8);
    }
    
    function draw() {
      // Clear
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Draw apple
      ctx.fillStyle = '#2ed573';
      ctx.beginPath();
      ctx.arc(
        (apple.x + 0.5) * CELL_SIZE,
        (apple.y + 0.5) * CELL_SIZE,
        CELL_SIZE / 2.4,
        0, Math.PI * 2
      );
      ctx.fill();
      // Draw snake
      snake.forEach((segment, i) => {
        ctx.fillStyle = i === 0 ? '#f9ca24' : '#fff';
        ctx.fillRect(
          segment.x * CELL_SIZE + 2,
          segment.y * CELL_SIZE + 2,
          CELL_SIZE - 4,
          CELL_SIZE - 4
        );
      });
    }

    function randomApple() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake && snake.some(seg => seg.x === pos.x && seg.y === pos.y));
      return pos;
    }

    // Controls
    function setDirection(dx, dy) {
      // Prevent reversing on itself
      if (!running) return;
      if (dx === -direction.x && dy === -direction.y) return;
      nextDirection = {x: dx, y: dy};
    }
    // Keyboard control
    window.addEventListener('keydown', e => {
      if (!running) return;
      switch (e.key) {
        case 'ArrowUp': case 'w': setDirection(0, -1); break;
        case 'ArrowDown': case 's': setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': setDirection(1, 0); break;
      }
    });
    // Touch control (swipe)
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    });
    canvas.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 15) setDirection(1, 0);
        else if (dx < -15) setDirection(-1, 0);
      } else {
        if (dy > 15) setDirection(0, 1);
        else if (dy < -15) setDirection(0, -1);
      }
    });
    // On-screen arrow controls (for mobile)
    document.getElementById('up').onclick = () => setDirection(0, -1);
    document.getElementById('down').onclick = () => setDirection(0, 1);
    document.getElementById('left').onclick = () => setDirection(-1, 0);
    document.getElementById('right').onclick = () => setDirection(1, 0);
    // Restart button
    document.getElementById('restart-btn').onclick = () => {
      clearTimeout(moveTimeoutId);
      startGame();
    };

    // Resize canvas for device pixel ratio
    function fitCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = 400 * dpr;
      canvas.height = 400 * dpr;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.scale(dpr, dpr);
      draw();
    }
    window.addEventListener('resize', fitCanvas);

    // Start!
    fitCanvas();
    startGame();
  </script>
</body>
</html>
